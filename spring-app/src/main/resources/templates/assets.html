<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>뉴스공탐지수</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="container">
    <header class="hero">
        <p class="eyebrow">NEWS FEAR &amp; GREED INDEX</p>
        <h1>뉴스공탐지수</h1>
        <p>매일 수집한 뉴스의 긍정·부정 신호를 종목별 0~100 지수로 확인합니다.</p>
    </header>

    <section class="panel">
        <div class="panel-title">
            <h2>분석 종목</h2>
            <span th:text="|총 ${#lists.size(assets)}개|">총 0개</span>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>종목</th>
                    <th>시장</th>
                    <th>최근 분석일</th>
                    <th>공탐지수</th>
                    <th>상태</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="asset : ${assets}">
                    <td>
                        <strong th:text="${asset.name}">삼성전자</strong>
                        <small th:text="${asset.code}">005930</small>
                    </td>
                    <td th:text="${asset.marketType}">KOSPI</td>
                    <td th:text="${asset.latestDate ?: '-'}">-</td>
                    <td class="score" th:text="${asset.latestScore ?: '-'}">-</td>
                    <td><span class="label" th:text="${asset.latestLabel}">NO_DATA</span></td>
                    <td><a class="detail-link" th:href="@{/assets/{id}(id=${asset.id})}">상세 보기</a></td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
