spring.application.name=news-fear-greed

spring.datasource.url=jdbc:mysql://localhost:3306/news_fear_greed?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# schema.sql/data.sql은 샘플 초안입니다. 자동 실행은 필요할 때만 always로 바꾸세요.
spring.sql.init.mode=never
spring.sql.init.encoding=UTF-8

spring.thymeleaf.cache=false
